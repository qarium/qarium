name: Lint
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check qarium/ tests/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check qarium/ tests/